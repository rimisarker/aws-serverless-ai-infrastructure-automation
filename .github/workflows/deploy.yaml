name: Deploy CloudMentor Backend Only

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**' # শুধুমাত্র ব্যাকএন্ডে পরিবর্তন হলে এটি রান করবে
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Serverless Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Build and deploy backend
        working-directory: backend
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          AI_MODE: ${{ secrets.AI_MODE }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
        run: |
          npm install --no-audit --no-fund
          sam build
          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              OpenAiApiKey="${OPENAI_API_KEY:-mock-placeholder}" \
              OpenAiModel="${OPENAI_MODEL:-gpt-4.1-mini}" \
              AiMode="${AI_MODE:-openai}" \
              CorsOrigin="${CORS_ORIGIN:-*}"
